<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; background:#f5f5f5; text-align:center; margin:0; padding:0; }
    h1 { background:#222; color:white; padding:15px; margin:0; }
    .stats{display:flex; justify-content:center; gap:20px; margin-top:15px; flex-wrap:wrap;}
    .card{background:white;padding:15px;border-radius:10px;width:150px;box-shadow:0 3px 8px rgba(0,0,0,0.1);}
    .order{background:white;margin:15px auto;padding:15px;width:320px;border-radius:10px;box-shadow:0 3px 8px rgba(0,0,0,0.1);}
    button{margin:5px;padding:5px 10px;border:none;border-radius:5px;cursor:pointer;}
    .serve{background:green;color:white;}
    .delete{background:red;color:white;}
    canvas{max-width:90%; margin: 20px auto;}
    @media(max-width:768px){.order{width:90%;}}
  </style>
</head>
<body>

<h1>Dashboard</h1>

<div class="stats">
  <div class="card"><p>Total Orders</p><h2 id="total">0</h2></div>
  <div class="card"><p>Pending</p><h2 id="pending">0</h2></div>
  <div class="card"><p>Served</p><h2 id="served">0</h2></div>
</div>

<div id="orders"></div>

<h2>Daily Orders History</h2>
<canvas id="ordersChart"></canvas>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJcSbCt9SCmOoq_OgiGSyvpxTKMiMOCm4",
  authDomain: "restaurantorderingsystem-782f7.firebaseapp.com",
  projectId: "restaurantorderingsystem-782f7",
  storageBucket: "restaurantorderingsystem-782f7.firebasestorage.app",
  messagingSenderId: "735632098137",
  appId: "1:735632098137:web:d5e8c888400fe3f33bc248"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ordersDiv = document.getElementById("orders");

let chart;

function updateChart(datesCount){
  const ctx = document.getElementById("ordersChart").getContext("2d");
  const labels = Object.keys(datesCount);
  const data = Object.values(datesCount);
  if(chart) chart.destroy();
  chart = new Chart(ctx, {
    type:'bar',
    data:{labels,data:{labels, datasets:[{label:'Orders per Day', data, backgroundColor:'orange'}]}},
    options:{scales:{y:{beginAtZero:true}}}
  });
}

onSnapshot(collection(db,"orders"), snapshot=>{
  ordersDiv.innerHTML = "";
  let total=0,pending=0,served=0;
  const datesCount={};

  snapshot.forEach(docSnap=>{
    total++;
    const data = docSnap.data();
    const id = docSnap.id;

    const dateKey = data.time.toDate ? data.time.toDate().toLocaleDateString() : new Date(data.time.seconds*1000).toLocaleDateString();
    datesCount[dateKey] = (datesCount[dateKey] || 0)+1;

    if(data.status==="pending") pending++; else if(data.status==="served") served++;

    ordersDiv.innerHTML += `
      <div class="order">
        <h3>Table ${data.tableNumber}</h3>
        <p><b>Items:</b> ${data.items.join(", ")}</p>
        <p><b>Status:</b> ${data.status}</p>
        <button class="serve" onclick="serveOrder('${id}')">✔ Serve</button>
        <button class="delete" onclick="deleteOrder('${id}')">❌ Delete</button>
      </div>
    `;
  });

  document.getElementById("total").innerText=total;
  document.getElementById("pending").innerText=pending;
  document.getElementById("served").innerText=served;

  updateChart(datesCount);
});

window.serveOrder=async function(id){ await updateDoc(doc(db,"orders",id), { status:"served" }); }
window.deleteOrder=async function(id){ await deleteDoc(doc(db,"orders",id)); }
</script>
</body>
</html>
