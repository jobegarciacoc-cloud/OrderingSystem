<!DOCTYPE html>
<html>
<head>
  <title>ano kaya name ng system natin</title>
  </title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }
    h1 {
      background: #222;
      color: #fff;
      padding: 15px;
      margin: 0;
    }
    h3 { margin-top: 10px; }
    .menu {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .item {
      background: white;
      padding: 15px;
      border-radius: 15px;
      width: 160px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .item img { width: 100px; height: 100px; border-radius: 10px; }
    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      background: #ff9800;
      color: white;
      cursor: pointer;
    }
    button:hover { background: #e68900; }
    #cart { font-weight: bold; margin: 10px; }
  </style>
</head>
<body>

<h1>ano kaya name ng system natin</h1>
<h3>Table 1</h3>

<div class="menu">
  <div class="item">
    <img src="Burger.jpg">
    <h3>Burger</h3>
    <button onclick="addToCart('Burger')">Add</button>
  </div>
  <div class="item">
    <img src="Fries.jpg">
    <h3>Fries</h3>
    <button onclick="addToCart('Fries')">Add</button>
  </div>
  <div class="item">
    <img src="Coke.jpg">
    <h3>Coke</h3>
    <button onclick="addToCart('Coke')">Add</button>
  </div>
</div>

<h2>Cart</h2>
<p id="cart"></p>
<button onclick="placeOrder()">Place Order</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAJcSbCt9SCmOoq_OgiGSyvpxTKMiMOCm4",
    authDomain: "restaurantorderingsystem-782f7.firebaseapp.com",
    projectId: "restaurantorderingsystem-782f7",
    storageBucket: "restaurantorderingsystem-782f7.firebasestorage.app",
    messagingSenderId: "735632098137",
    appId: "1:735632098137:web:d5e8c888400fe3f33bc248"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let cart = [];

  window.addToCart = function(item){
    cart.push(item);
    document.getElementById("cart").innerText = cart.join(", ");
  }

  window.placeOrder = async function(){
    if(cart.length === 0){ alert("Cart is empty!"); return; }
    try{
      await addDoc(collection(db,"orders"),{
        tableNumber: 1,
        items: cart,
        status: "pending",
        time: new Date()
      });
      alert("✅ Order Placed!");
      cart = [];
      document.getElementById("cart").innerText = "";
    }catch(e){ console.error(e); }
  }
</script>
</body>
</html>
