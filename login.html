<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
  <style>
    body { font-family: Arial; text-align: center; background: #f5f5f5; }
    h1 { background: #222; color: white; padding: 15px; }
    input { padding: 10px; margin: 10px; width: 200px; border-radius: 5px; border: 1px solid #ccc; }
    button { padding: 10px 15px; border: none; border-radius: 5px; background: #ff9800; color: white; cursor: pointer; }
    button:hover { background: #e68900; }
  </style>
</head>
<body>
<h1>Admin Login</h1>
<input type="text" id="username" placeholder="Username"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="login()">Login</button>

<script>
  function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    // Simplified: hardcoded admin credentials
    if(user === "admin" && pass === "1234") {
      window.location.href = "admin_dashboard.html";
    } else {
      alert("❌ Invalid credentials!");
    }
  }
</script>
</body>
</html>
