<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
  <style>
    body { font-family: Arial; text-align: center; background: #f5f5f5; }
    h1 { background: #222; color: white; padding: 15px; }
    input { padding: 10px; margin: 10px; width: 200px; border-radius: 5px; border: 1px solid #ccc; }
    button { padding: 10px 15px; border: none; border-radius: 5px; background: #ff9800; color: white; cursor: pointer; }
    button:hover { background: #e68900; }
  </style>
</head>
<body>
<h1>Admin Login</h1>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="login()">Login</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJcSbCt9SCmOoq_OgiGSyvpxTKMiMOCm4",
  authDomain: "restaurantorderingsystem-782f7.firebaseapp.com",
  projectId: "restaurantorderingsystem-782f7",
  storageBucket: "restaurantorderingsystem-782f7.firebasestorage.app",
  messagingSenderId: "735632098137",
  appId: "1:735632098137:web:d5e8c888400fe3f33bc248"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => { window.location.href = "admin_dashboard.html"; })
    .catch(err => { alert("❌ " + err.message); });
}
</script>
</body>
</html>
