<!DOCTYPE html>
<html>
<head>
  <title>Order - Admin</title>
  <style>
    body { font-family: Arial; background: #f5f5f5; text-align: center; }
    h1 { background: #222; color: white; padding: 15px; }
    .order {
      background: white;
      margin: 15px auto;
      padding: 15px;
      width: 320px;
      border-radius: 10px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }
    button { margin: 5px; padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer; }
    .serve { background: green; color: white; }
    .delete { background: red; color: white; }
  </style>
</head>
<body>

<h1>Admin Panel</h1>
<div id="orders"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAJcSbCt9SCmOoq_OgiGSyvpxTKMiMOCm4",
    authDomain: "restaurantorderingsystem-782f7.firebaseapp.com",
    projectId: "restaurantorderingsystem-782f7",
    storageBucket: "restaurantorderingsystem-782f7.firebasestorage.app",
    messagingSenderId: "735632098137",
    appId: "1:735632098137:web:d5e8c888400fe3f33bc248"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ordersDiv = document.getElementById("orders");

onSnapshot(collection(db,"orders"), snapshot=>{
  ordersDiv.innerHTML = "";
  snapshot.forEach(docSnap=>{
    const data = docSnap.data();
    const id = docSnap.id;
    ordersDiv.innerHTML += `
      <div class="order">
        <h3>Table ${data.tableNumber}</h3>
        <p><b>Items:</b> ${data.items.join(", ")}</p>
        <p><b>Status:</b> ${data.status}</p>
        <button class="serve" onclick="serveOrder('${id}')">✔ Serve</button>
        <button class="delete" onclick="deleteOrder('${id}')">❌ Delete</button>
      </div>
    `;
  });
});

window.serveOrder = async function(id){
  await updateDoc(doc(db,"orders",id), { status:"served" });
}

window.deleteOrder = async function(id){
  await deleteDoc(doc(db,"orders",id));
}
</script>
</body>
</html>
